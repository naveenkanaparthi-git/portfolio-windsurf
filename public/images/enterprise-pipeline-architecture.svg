<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-label="Enterprise data pipeline architecture">
  <defs>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" rx="24" fill="#0b1220"/>
  <text x="60" y="90" font-family="ui-sans-serif, system-ui" font-size="36" font-weight="800" fill="#fff">Enterprise Data Pipeline Platform</text>
  <text x="60" y="130" font-family="ui-sans-serif, system-ui" font-size="20" fill="#94a3b8">Sources → ingestion → transformations → BigQuery (partitioned/clust.)</text>

  <g font-family="ui-sans-serif, system-ui" font-size="18" fill="#e2e8f0">
    <rect x="80" y="220" width="270" height="120" rx="18" fill="#111827" stroke="#1f2937"/>
    <text x="110" y="270">APIs / Files</text>
    <text x="110" y="302" fill="#94a3b8">JSON, Parquet</text>

    <rect x="420" y="180" width="330" height="120" rx="18" fill="#111827" stroke="#1f2937"/>
    <text x="450" y="230">Ingestion</text>
    <text x="450" y="262" fill="#94a3b8">Kafka + batch loaders</text>

    <rect x="420" y="330" width="330" height="120" rx="18" fill="#111827" stroke="#1f2937"/>
    <text x="450" y="380">Orchestration</text>
    <text x="450" y="412" fill="#94a3b8">Dagster assets + retries</text>

    <rect x="830" y="250" width="310" height="120" rx="18" fill="#111827" stroke="#1f2937"/>
    <text x="860" y="300">BigQuery</text>
    <text x="860" y="332" fill="#94a3b8">Partitioning / clustering</text>

    <path d="M350 280h70" stroke="url(#a)" stroke-width="6" stroke-linecap="round"/>
    <path d="M750 240h80" stroke="url(#a)" stroke-width="6" stroke-linecap="round"/>
    <path d="M750 390h80" stroke="url(#a)" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
