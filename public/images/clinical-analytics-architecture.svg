<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-label="Clinical analytics platform architecture">
  <defs>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" rx="24" fill="#0b1220"/>
  <text x="60" y="90" font-family="ui-sans-serif, system-ui" font-size="36" font-weight="800" fill="#fff">Clinical Data Analytics Platform</text>
  <text x="60" y="130" font-family="ui-sans-serif, system-ui" font-size="20" fill="#94a3b8">High-level flow: sources → validation → warehouse → BI dashboards</text>

  <g font-family="ui-sans-serif, system-ui" font-size="18" fill="#e2e8f0">
    <rect x="80" y="200" width="250" height="110" rx="18" fill="#111827" stroke="#1f2937"/>
    <text x="110" y="250">Clinical DBs</text>
    <text x="110" y="282" fill="#94a3b8">EHR / lab systems</text>

    <rect x="420" y="200" width="300" height="110" rx="18" fill="#111827" stroke="#1f2937"/>
    <text x="450" y="250">Validation + ELT</text>
    <text x="450" y="282" fill="#94a3b8">SQL checks, quality rules</text>

    <rect x="810" y="200" width="310" height="110" rx="18" fill="#111827" stroke="#1f2937"/>
    <text x="840" y="250">Analytics Layer</text>
    <text x="840" y="282" fill="#94a3b8">Power BI / Tableau</text>

    <rect x="420" y="360" width="300" height="110" rx="18" fill="#111827" stroke="#1f2937"/>
    <text x="450" y="410">Warehouse</text>
    <text x="450" y="442" fill="#94a3b8">Curated tables + marts</text>

    <path d="M330 255h90" stroke="url(#a)" stroke-width="6" stroke-linecap="round"/>
    <path d="M720 255h90" stroke="url(#a)" stroke-width="6" stroke-linecap="round"/>
    <path d="M570 310v50" stroke="url(#a)" stroke-width="6" stroke-linecap="round"/>
    <path d="M570 470v40" stroke="url(#a)" stroke-width="6" stroke-linecap="round" opacity="0"/>
  </g>
</svg>
