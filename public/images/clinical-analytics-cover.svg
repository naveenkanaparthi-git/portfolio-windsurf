    <rect x="150" y="365" width="240" height="12" rx="6" fill="#3b82f6" opacity="0.75"/>
    <rect x="480" y="365" width="240" height="12" rx="6" fill="#22c55e" opacity="0.75"/>
    <rect x="810" y="365" width="240" height="12" rx="6" fill="#a78bfa" opacity="0.75"/>
